<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="50%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6c63ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#a882ff"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ecdc4"/>
      <stop offset="100%" stop-color="#45b7aa"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="200" cy="300" r="250" fill="url(#glow1)" filter="url(#bigGlow)"/>
  <circle cx="1000" cy="200" r="200" fill="url(#glow2)" filter="url(#bigGlow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#8b8fa3" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Neural network visualization on the right -->
  <g transform="translate(780, 160)" filter="url(#softGlow)">
    <!-- Connections (edges) -->
    <g stroke-width="1.5" opacity="0.3">
      <!-- Layer 1 to Layer 2 -->
      <line x1="30" y1="40" x2="150" y2="20" stroke="#6c63ff"/>
      <line x1="30" y1="40" x2="150" y2="100" stroke="#6c63ff"/>
      <line x1="30" y1="40" x2="150" y2="180" stroke="#6c63ff"/>
      <line x1="30" y1="120" x2="150" y2="20" stroke="#4ecdc4"/>
      <line x1="30" y1="120" x2="150" y2="100" stroke="#4ecdc4"/>
      <line x1="30" y1="120" x2="150" y2="180" stroke="#4ecdc4"/>
      <line x1="30" y1="200" x2="150" y2="20" stroke="#ff6b6b"/>
      <line x1="30" y1="200" x2="150" y2="100" stroke="#ff6b6b"/>
      <line x1="30" y1="200" x2="150" y2="180" stroke="#ff6b6b"/>
      <line x1="30" y1="280" x2="150" y2="20" stroke="#ff9f43"/>
      <line x1="30" y1="280" x2="150" y2="100" stroke="#ff9f43"/>
      <line x1="30" y1="280" x2="150" y2="180" stroke="#ff9f43"/>
      <!-- Layer 2 to Layer 3 -->
      <line x1="150" y1="20" x2="280" y2="70" stroke="#6c63ff"/>
      <line x1="150" y1="20" x2="280" y2="180" stroke="#6c63ff"/>
      <line x1="150" y1="100" x2="280" y2="70" stroke="#4ecdc4"/>
      <line x1="150" y1="100" x2="280" y2="180" stroke="#4ecdc4"/>
      <line x1="150" y1="180" x2="280" y2="70" stroke="#ff9f43"/>
      <line x1="150" y1="180" x2="280" y2="180" stroke="#ff9f43"/>
    </g>

    <!-- Animated-look pulse lines (brighter select connections) -->
    <g stroke-width="2" opacity="0.6">
      <line x1="30" y1="120" x2="150" y2="100" stroke="#4ecdc4"/>
      <line x1="150" y1="100" x2="280" y2="70" stroke="#4ecdc4"/>
      <line x1="30" y1="40" x2="150" y2="20" stroke="#6c63ff"/>
      <line x1="150" y1="20" x2="280" y2="180" stroke="#6c63ff"/>
    </g>

    <!-- Layer 1 nodes (input) -->
    <circle cx="30" cy="40" r="12" fill="url(#nodeGrad1)" opacity="0.9"/>
    <circle cx="30" cy="120" r="12" fill="url(#nodeGrad2)" opacity="0.9"/>
    <circle cx="30" cy="200" r="12" fill="url(#nodeGrad3)" opacity="0.9"/>
    <circle cx="30" cy="280" r="12" fill="url(#nodeGrad1)" opacity="0.7"/>

    <!-- Layer 2 nodes (hidden) -->
    <circle cx="150" cy="20" r="14" fill="url(#nodeGrad1)" opacity="0.9"/>
    <circle cx="150" cy="100" r="14" fill="url(#nodeGrad2)" opacity="0.9"/>
    <circle cx="150" cy="180" r="14" fill="url(#nodeGrad3)" opacity="0.9"/>

    <!-- Layer 3 nodes (output) -->
    <circle cx="280" cy="70" r="16" fill="url(#nodeGrad2)" opacity="0.9"/>
    <circle cx="280" cy="180" r="16" fill="url(#nodeGrad1)" opacity="0.9"/>
  </g>

  <!-- Floating math symbols -->
  <g font-family="Georgia, serif" opacity="0.08" fill="#e8e8e8">
    <text x="100" y="100" font-size="28">∑</text>
    <text x="680" y="520" font-size="24">∂</text>
    <text x="900" y="560" font-size="22">σ</text>
    <text x="150" y="520" font-size="26">∇</text>
    <text x="500" y="80" font-size="20">softmax</text>
    <text x="1050" y="100" font-size="22">θ</text>
  </g>

  <!-- Title -->
  <text x="80" y="250" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="url(#accent)">Softmax Academy</text>

  <!-- Subtitle -->
  <text x="82" y="300" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" fill="#8b8fa3">How LLMs Work</text>

  <!-- Author line -->
  <text x="82" y="345" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="20" fill="#8b8fa3">By <tspan fill="#4ecdc4" font-weight="600">Pedram Rezaei</tspan> &amp; <tspan fill="#4ecdc4" font-weight="600">Claude</tspan></text>

  <!-- Stats row -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="18">
    <text x="82" y="390" fill="#4ecdc4" font-weight="600">16 chapters</text>
    <text x="232" y="390" fill="#2e3244">|</text>
    <text x="252" y="390" fill="#4ecdc4" font-weight="600">50+ interactive demos</text>
    <text x="492" y="390" fill="#2e3244">|</text>
    <text x="512" y="390" fill="#4ecdc4" font-weight="600">930KB of content</text>
  </g>

  <!-- Topic pills -->
  <g font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600">
    <rect x="82" y="430" rx="14" ry="14" width="110" height="28" fill="rgba(108,99,255,0.2)"/>
    <text x="104" y="449" fill="#6c63ff">Transformers</text>

    <rect x="202" y="430" rx="14" ry="14" width="72" height="28" fill="rgba(78,205,196,0.2)"/>
    <text x="216" y="449" fill="#4ecdc4">RAG</text>

    <rect x="284" y="430" rx="14" ry="14" width="110" height="28" fill="rgba(255,107,107,0.2)"/>
    <text x="302" y="449" fill="#ff6b6b">Embeddings</text>

    <rect x="404" y="430" rx="14" ry="14" width="100" height="28" fill="rgba(255,230,109,0.2)"/>
    <text x="420" y="449" fill="#ffe66d">Fine-Tuning</text>

    <rect x="514" y="430" rx="14" ry="14" width="100" height="28" fill="rgba(168,130,255,0.2)"/>
    <text x="530" y="449" fill="#a882ff">Prompting</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
